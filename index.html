<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的互動遊戲大廳</title>
    <style>
        body { 
            font-family: "jf-open-huninn", "Microsoft JhengHei", sans-serif; 
            padding: 20px; 
            background-color: #fff9f0; 
            color: #444;
            text-align: center;
        }
        #clock-container {
            background-color: #ffffff;
            border: 3px dashed #ffb74d;
            border-radius: 20px;
            display: inline-block;
            padding: 15px 40px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        #date-display { font-size: 1.3rem; color: #666; }
        #time-display { font-size: 2.8rem; color: #ff8c00; font-weight: bold; }
        #encouragement-text {
            font-size: 1.6rem;
            color: #e67e22;
            font-weight: bold;
            margin-bottom: 40px;
            min-height: 1.8em;
        }
        h1 { color: #ff8c00; font-size: 2.2em; margin-bottom: 30px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            max-width: 1200px;
            margin: 0 auto;
        }
        .card { 
            display: block;
            padding: 40px 20px; 
            border-radius: 25px; 
            text-decoration: none; 
            color: #333;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            transition: all 0.3s;
            border: 4px solid white;
            text-align: center;
        }
        .card:hover { transform: scale(1.05) rotate(2deg); }
        .emoji { font-size: 4.5em; display: block; margin-bottom: 15px; }
        .card h3 { margin: 10px 0; font-size: 1.5em; color: #222; }
    </style>
</head>
<body>

    <div id="clock-container">
        <div id="date-display">正在確認日期...</div>
        <div id="time-display">00:00:00</div>
    </div>

    <div id="encouragement-text">✨ 準備好要開始學習了嗎？ ✨</div>

    <h1>🐾 我的互動教學大廳 🐾</h1>
    
    <div id="project-list" class="grid"></div>

    <script>
        // 1. 時間與隨機語
        function updateClock() {
            const now = new Date();
            document.getElementById('date-display').innerText = now.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            document.getElementById('time-display').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        const phrases = ["✨ 今天的你，也會有超棒的表現喔！", "🐰 阿白和土土幫你加油！", "💪 你是最棒的學習小超人！"];
        document.getElementById('encouragement-text').innerText = phrases[Math.floor(Math.random() * phrases.length)];

        // 2. 這裡「直接寫死」妳所有的連結，不依賴網路抓取！
        const username = 'marypingu213-code';
        const myProjects = [
            // 外部連結
            { name: 'Canva 互動課程', emoji: '💎', url: 'https://www.canva.com/design/DAG-uatWjDI/LxRBHSKEZGycu1bAeAM8tQ/view', color: '#FFD1DC' },
            { name: 'Classkick 課中練習', emoji: '💎', url: 'https://www.canva.com/design/DAHEekV3BTA/km7Bk5KLnTGW3h9eyK16aw/edit', color: '#FFECB3' },
            
            // GitHub 專案 (手動填入名稱)
            { name: 'grade-3-web', emoji: '💎', color: '#C8E6C9' },
            { name: 'RICHMAN3', emoji: '💎', color: '#B3E5FC' },
            { name: 'G3-diamond', emoji: '🐰', color: '#D1C4E9' },
            { name: 'G5-diamond', emoji: '🐼', color: '#F8BBD0' },
            { name: 'vacab-3', emoji: '🦊', color: '#E1BEE7' }
        ];

        const container = document.getElementById('project-list');
        
        myProjects.forEach(p => {
            const card = document.createElement('a');
            // 如果沒給 url，就自動生成 GitHub Pages 連結
            const finalUrl = p.url || `https://${username}.github.io/${p.name}/`;
            
            card.href = finalUrl;
            card.className = 'card';
            card.target = '_blank';
            card.style.backgroundColor = p.color;
            card.innerHTML = `<span class="emoji">${p.emoji}</span><h3>${p.name}</h3><p>點擊開始學習</p>`;
            container.appendChild(card);
        });
    </script>
</body>
</html>
